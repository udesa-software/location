services:
  api:
    build: .
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      MONGODB_URI: mongodb://mongo:27017/location
      JWT_SECRET: ${JWT_SECRET}
      MIN_UPDATE_INTERVAL_SECONDS: ${MIN_UPDATE_INTERVAL_SECONDS:-60}
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:

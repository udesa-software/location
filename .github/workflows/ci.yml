name: CI

on:
  push:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

jobs:
  # ── Tests unitarios (sin DB) ────────────────────────────────────────────────
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run unit tests with coverage
        run: node node_modules/jest/bin/jest.js --coverage

      - name: Upload unit coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: udesa-software/location
          files: ./coverage/lcov.info
          flags: unit
          fail_ci_if_error: true

      - name: Test summary
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            await core.summary
              .addHeading('Unit Test Results')
              .addTable([
                [{data: 'Step', header: true}, {data: 'Status', header: true}],
                ['Unit tests (npm run test:coverage)', '${{ job.status }}']
              ])
              .write()

  # ── Tests de integración (requiere MongoDB) ────────────────────────────────
  integration-tests:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run integration tests with coverage
        run: node node_modules/jest/bin/jest.js --config jest.integration.config.js --coverage
        env:
          MONGODB_URI:                mongodb://localhost:27017/location_test
          JWT_SECRET:                 ${{ secrets.JWT_SECRET || 'ci-jwt-secret-muy-largo-para-tests' }}
          MIN_UPDATE_INTERVAL_SECONDS: '0'
          FRIENDS_SERVICE_URL:        http://localhost:9998
          USERS_SERVICE_URL:          http://localhost:9999

      - name: Upload integration coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: udesa-software/location
          files: ./coverage-integration/lcov.info
          flags: integration
          fail_ci_if_error: true

      - name: Test summary
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            await core.summary
              .addHeading('Integration Test Results')
              .addTable([
                [{data: 'Step', header: true}, {data: 'Status', header: true}],
                ['Integration tests (npm run test:integration:coverage)', '${{ job.status }}']
              ])
              .write()
